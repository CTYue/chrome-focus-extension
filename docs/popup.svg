<svg xmlns="http://www.w3.org/2000/svg" width="360" height="420" viewBox="0 0 360 420">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000022"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f7ff"/>
      <stop offset="100%" stop-color="#f0eeff"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background card -->
  <rect x="40" y="20" width="280" height="380" rx="16" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Header bar -->
  <rect x="40" y="20" width="280" height="56" rx="16" fill="#4f46e5"/>
  <rect x="40" y="56" width="280" height="20" fill="#4f46e5"/>

  <!-- Extension icon in header -->
  <circle cx="70" cy="48" r="14" fill="#ffffff33"/>
  <text x="70" y="53" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white">🎯</text>

  <!-- Title -->
  <text x="92" y="44" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="white">Focus Me</text>
  <text x="92" y="60" font-family="system-ui, sans-serif" font-size="10" fill="#c7d2fe">Stay in the zone</text>

  <!-- Focus Mode row -->
  <rect x="56" y="92" width="248" height="52" rx="12" fill="white" opacity="0.9"/>
  <text x="72" y="112" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e1b4b">Focus Mode</text>
  <text x="72" y="128" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">All enforcement active</text>
  <!-- Toggle ON -->
  <rect x="258" y="106" width="34" height="18" rx="9" fill="#4f46e5"/>
  <circle cx="283" cy="115" r="7" fill="white"/>

  <!-- Stats row -->
  <!-- Windows card -->
  <rect x="56" y="160" width="114" height="80" rx="12" fill="white" opacity="0.9"/>
  <text x="113" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="0.5">WINDOWS</text>
  <text x="113" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#4f46e5">1</text>
  <text x="113" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">of 1 max</text>

  <!-- Tabs card -->
  <rect x="190" y="160" width="114" height="80" rx="12" fill="white" opacity="0.9"/>
  <text x="247" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="0.5">TABS</text>
  <text x="247" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#22c55e">14</text>
  <text x="247" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">of 20 max</text>

  <!-- Merge Windows button -->
  <rect x="56" y="258" width="248" height="44" rx="12" fill="url(#btnGrad)"/>
  <text x="180" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">⊞  Merge Windows</text>

  <!-- Settings button -->
  <rect x="56" y="314" width="248" height="44" rx="12" fill="white" opacity="0.9" stroke="#e5e7eb" stroke-width="1"/>
  <text x="180" y="341" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#374151">⚙  Settings</text>

  <!-- Caption -->
  <text x="180" y="408" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Focus Me — Popup</text>
</svg>
