<svg xmlns="http://www.w3.org/2000/svg" width="480" height="520" viewBox="0 0 480 520">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#00000018"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="480" height="520" fill="#f5f3ff"/>

  <!-- Browser chrome suggestion -->
  <rect x="0" y="0" width="480" height="36" rx="0" fill="#e5e7eb"/>
  <circle cx="20" cy="18" r="6" fill="#f87171"/>
  <circle cx="40" cy="18" r="6" fill="#fbbf24"/>
  <circle cx="60" cy="18" r="6" fill="#4ade80"/>
  <rect x="90" y="9" width="300" height="18" rx="9" fill="white"/>
  <text x="240" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">chrome-extension://…/options.html</text>

  <!-- Settings card -->
  <rect x="60" y="52" width="360" height="448" rx="16" fill="white" filter="url(#shadow)"/>

  <!-- Card header -->
  <rect x="60" y="52" width="360" height="64" rx="16" fill="url(#headerGrad)"/>
  <rect x="60" y="96" width="360" height="20" fill="url(#headerGrad)"/>
  <text x="240" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">⚙  Settings</text>
  <text x="240" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c7d2fe">Focus Me — Configuration</text>

  <!-- Section label: General -->
  <text x="84" y="138" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6366f1" letter-spacing="1">GENERAL</text>

  <!-- Enable Focus Mode row -->
  <rect x="76" y="146" width="328" height="54" rx="10" fill="#f8f7ff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="96" y="168" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e1b4b">Enable Focus Mode</text>
  <text x="96" y="186" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Master switch — turns all enforcement on or off</text>
  <rect x="356" y="158" width="36" height="20" rx="10" fill="#4f46e5"/>
  <circle cx="383" cy="168" r="8" fill="white"/>

  <!-- Show notifications row -->
  <rect x="76" y="208" width="328" height="54" rx="10" fill="#f8f7ff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="96" y="230" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e1b4b">Show notifications</text>
  <text x="96" y="248" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">OS alert when a window or tab is blocked</text>
  <rect x="356" y="220" width="36" height="20" rx="10" fill="#4f46e5"/>
  <circle cx="383" cy="230" r="8" fill="white"/>

  <!-- Section label: Limits -->
  <text x="84" y="286" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6366f1" letter-spacing="1">LIMITS</text>

  <!-- Max windows row -->
  <rect x="76" y="294" width="328" height="54" rx="10" fill="#f8f7ff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="96" y="316" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e1b4b">Max windows</text>
  <text x="96" y="334" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Extra windows are redirected as tabs</text>
  <!-- Number input -->
  <rect x="338" y="310" width="54" height="28" rx="6" fill="white" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="365" y="329" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e1b4b">1</text>

  <!-- Max tabs row -->
  <rect x="76" y="356" width="328" height="54" rx="10" fill="#f8f7ff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="96" y="378" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e1b4b">Max tabs per window</text>
  <text x="96" y="396" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Set to 0 for no limit</text>
  <!-- Number input -->
  <rect x="330" y="368" width="62" height="28" rx="6" fill="white" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="361" y="387" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e1b4b">20</text>

  <!-- Save button -->
  <rect x="76" y="426" width="328" height="44" rx="10" fill="#4f46e5"/>
  <text x="240" y="453" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">Save Settings</text>

  <!-- Sync note -->
  <text x="240" y="508" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Settings sync across all devices via chrome.storage.sync</text>
</svg>
